<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MST - e-Voting</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/yxjxZmRN/Logo_mstsc_(1)_(1).png">
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Anuphan', 'sans-serif'] } } } }</script>
    <script>
        function checkInAppBrowser() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            // เช็คว่าเป็นแอปโซเชียลหรือไม่
            var isInApp = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1) || 
                          (ua.indexOf("Instagram") > -1) || (ua.indexOf("Line") > -1) || 
                          (ua.indexOf("LINE") > -1) || (ua.indexOf("TikTok") > -1);
            
            if(isInApp) {
                document.write(`
                    <div style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:#faf5ff; z-index:999999; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; font-family:'Anuphan',sans-serif;">
                        <svg style="width:80px; color:#6b21a8; margin-bottom:20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                        <h2 style="color:#6b21a8; font-weight:bold; margin-bottom:10px;">โปรดเปิดในเบราว์เซอร์หลัก</h2>
                        <p style="color:#555; font-size:16px; margin-bottom:30px;">ระบบ e-Voting ไม่รองรับการเปิดผ่านแอป LINE, Facebook หรือ IG<br><br>กรุณากดที่เมนู <b>(จุด 3 จุด)</b> มุมขวาบน หรือ ล่างขวา<br>แล้วเลือก <b>"เปิดในเบราว์เซอร์" (Open in browser)</b></p>
                        <button onclick="navigator.clipboard.writeText(window.location.href); alert('คัดลอกลิงก์แล้ว! นำไปเปิดใน Safari หรือ Chrome ได้เลย');" style="background:#6b21a8; color:white; border:none; padding:15px 30px; border-radius:30px; font-size:16px; font-weight:bold; box-shadow:0 4px 15px rgba(107,33,168,0.3);">📋 คัดลอกลิงก์เว็บไซต์</button>
                    </div>
                `);
                document.close();
                window.stop(); // หยุดการโหลดสคริปต์อื่นๆ ของหน้าเว็บทั้งหมด
            }
        }
        checkInAppBrowser();
    </script>
    <style> 
        /* บังคับให้พื้นหลังสุดของจอเป็นสีม่วงเข้ม เพื่อให้แถบด้านบนทะลุลงมาเจอสีม่วง */
        html { background-color: #6820a3; }
        body { font-family: 'Anuphan', sans-serif; } 
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#581c87">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gradient-to-br from-purple-900 via-purple-800 to-purple-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-2xl max-w-md w-full text-center">
        <img src="https://i.postimg.cc/yxjxZmRN/Logo_mstsc_(1)_(1).png" alt="MSTSC Logo" class="mx-auto w-28 h-auto mb-6 drop-shadow-md hover:scale-105 transition-transform">
        
        <h1 class="text-2xl font-bold text-purple-900 mb-1">ระบบลงคะแนนอิเล็กทรอนิกส์</h1>
        <p class="text-gray-500 mb-8 text-sm font-medium">คณะกรรมการสภานักเรียน โรงเรียนเมืองสุราษฎร์ธานี</p>
        
        <button id="loginBtn" class="w-full bg-white border border-gray-300 hover:bg-purple-50 hover:border-purple-300 text-gray-700 font-medium py-3 px-4 rounded-lg flex items-center justify-center gap-3 transition-all duration-200 shadow-sm">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            เข้าสู่ระบบด้วยอีเมล @mst.ac.th
        </button>
        <p class="text-xs text-red-500 mt-5 font-medium">*สงวนสิทธิ์เฉพาะนักเรียนและบุคลากรภายในเท่านั้น</p>
    </div>

    <script type="module" src="auth.js"></script>
    <script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    document.addEventListener("DOMContentLoaded", () => {
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        
        // เซนเซอร์แยกแยะประเภทอุปกรณ์
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const isIPadPro = navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1; // ดักจับ iPad รุ่นใหม่
        const isMobileDevice = isMobile || isIPadPro;

        // ✅ เงื่อนไขใหม่: ถ้าเปิดผ่านแอปแล้ว หรือ "เป็นคอมพิวเตอร์" ให้หยุดการทำงานโค้ดนี้ (ปล่อยให้เห็นหน้า Login ปกติ)
        if (isStandalone || !isMobileDevice) return;

        // สร้างหน้าต่างบังคับเต็มจอ (Overlay) - อัปเดตรูป e-voting.jpg
        const overlay = document.createElement('div');
        overlay.className = "fixed inset-0 bg-purple-900/95 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-6 text-center";
        overlay.innerHTML = `
            <img src="https://i.postimg.cc/rpc7TzZn/e-voting.jpg" class="w-24 h-24 mb-6 drop-shadow-lg rounded-full border-4 border-white/20 object-cover">
            
            <h2 class="text-2xl font-bold text-white mb-2">เข้าใช้งานผ่านแอปพลิเคชัน</h2>
            <p class="text-purple-200 mb-8 text-sm max-w-xs">เพื่อความเสถียรและรวดเร็ว กรุณาติดตั้งแอป MST e-Voting ลงบนเครื่องของท่านก่อนเข้าสู่ระบบ</p>
            
            <button id="forceInstallBtn" class="w-full max-w-xs bg-white text-purple-900 font-bold py-3.5 px-4 rounded-xl shadow-lg hover:scale-105 transition-transform mb-4 flex items-center justify-center gap-2 text-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                ติดตั้งแอปทันที
            </button>
            
            <button id="skipInstallBtn" class="text-purple-300 hover:text-white text-sm underline decoration-purple-400/50 underline-offset-4 py-2">
                ใช้งานผ่านเว็บเบราว์เซอร์ชั่วคราว
            </button>
        `;
        document.body.appendChild(overlay);

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        document.getElementById('forceInstallBtn').addEventListener('click', async () => {
            // เซนเซอร์ตรวจจับแอปภายนอก (LINE, Facebook, Messenger, IG)
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isInAppBrowser = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1) || (ua.indexOf("Line") > -1) || (ua.indexOf("Instagram") > -1);

            if (isInAppBrowser) {
                // 🚨 ถ้าเปิดผ่านเฟซบุ๊ก หรือ ไลน์ ให้เตือนไปเปิดเบราว์เซอร์หลักก่อน
                Swal.fire({
                    title: 'เปิดในเบราว์เซอร์หลัก',
                    html: `แอปพลิเคชันที่คุณใช้อยู่ไม่รองรับการติดตั้งแอปครับ<br><br>กรุณากดเมนู <b>จุด 3 จุด</b> (มุมขวาบน หรือ ล่างขวา)<br>แล้วเลือก <b>"เปิดในเบราว์เซอร์"</b> หรือ <b>"เปิดใน Safari / Chrome"</b> ก่อนครับ`,
                    icon: 'warning',
                    confirmButtonColor: '#6b21a8'
                });
            } else if (deferredPrompt) {
                // ✅ สำหรับ Android Chrome (รองรับการเด้งป๊อปอัปติดตั้งอัตโนมัติ 1-Click)
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') overlay.remove();
                deferredPrompt = null;
            } else if (/iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)) {
                // 🍎 สำหรับ Apple (iPhone, iPad) ที่เปิดผ่าน Safari แล้ว
                Swal.fire({
                    title: 'วิธีติดตั้งบน iOS',
                    html: `
                        <div class="text-left text-sm text-gray-600 mt-2 bg-gray-50 p-4 rounded-lg border border-gray-100">
                            <b>1.</b> กดปุ่มแชร์ <svg class="w-5 h-5 inline text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg> ตรงแถบเครื่องมือด้านล่างของจอ<br><br>
                            <b>2.</b> เลือกเมนู <b class="text-purple-700">"เพิ่มไปยังหน้าจอโฮม"</b> <span class="text-xs text-gray-400">(Add to Home Screen)</span>
                        </div>
                    `,
                    icon: 'info',
                    confirmButtonColor: '#6b21a8'
                });
            } else if (/Macintosh|MacIntel|Windows|Linux/.test(navigator.userAgent)) {
                // 💻 สำหรับคอมพิวเตอร์
                Swal.fire({
                    title: 'การติดตั้งบนคอมพิวเตอร์',
                    html: `
                        <div class="text-left text-sm text-gray-600 mt-2">
                            หากท่านใช้งานผ่าน <b>Google Chrome</b> หรือ <b>Edge</b>:<br><br>
                            ให้มองหาไอคอน <b>"ดาวน์โหลด/ติดตั้งแอป"</b> <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> ที่บริเวณ <b>ขวาสุดของช่องพิมพ์ URL ด้านบน</b> แล้วคลิกติดตั้งได้เลยครับ<br><br>
                            <span class="text-xs text-red-500">*หากไม่ต้องการติดตั้ง ท่านสามารถกดปุ่ม "ใช้งานผ่านเว็บเบราว์เซอร์ชั่วคราว" ด้านล่างเพื่อเข้าสู่ระบบได้ทันทีครับ</span>
                        </div>
                    `,
                    icon: 'info',
                    confirmButtonColor: '#6b21a8'
                });
            } else {
                Swal.fire('คำแนะนำ', 'เบราว์เซอร์นี้ไม่รองรับการติดตั้งแอป กรุณากดใช้งานผ่านเว็บชั่วคราวด้านล่างครับ', 'warning');
            }
        });

        // ถ้าเครื่องมีปัญหา ติดตั้งไม่ได้จริงๆ ให้กดปุ่มนี้เพื่อปิดหน้าต่างบังคับ
        document.getElementById('skipInstallBtn').addEventListener('click', () => {
            overlay.classList.add('opacity-0', 'transition-opacity', 'duration-500');
            setTimeout(() => overlay.remove(), 500);
        });
    });
    </script>
</body>
</html>
